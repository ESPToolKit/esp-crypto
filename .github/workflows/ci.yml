name: CI

on:
  push:
    branches: [ main, master, v2 ]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  host-portable-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build host smoke target
        run: cmake --build build

      - name: Run host smoke target
        run: ctest --test-dir build --output-on-failure

  esp-idf-core-smoke:
    runs-on: ubuntu-latest
    needs: host-portable-smoke
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32s3, esp32c3, esp32p4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ESP-IDF component smoke app
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: ${{ matrix.target }}
          path: examples/esp_idf_core_smoke

  arduino-platformio:
    runs-on: ubuntu-latest
    needs: host-portable-smoke
    strategy:
      fail-fast: false
      matrix:
        board: [esp32dev, esp32-s3-devkitc-1, esp32-c3-devkitm-1, esp32-p4-evboard]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/library.json') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PIOArduino Core
        run: python -m pip install --upgrade https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.18.zip

      - name: Install PIOArduino ESP32 Platform
        run: pio platform install https://github.com/pioarduino/platform-espressif32.git

      - name: Build Arduino examples with PlatformIO
        run: |
          set -e
          for d in examples/*; do
            if [ -d "$d" ] && [ ! -f "$d/CMakeLists.txt" ]; then
              echo "Building $d on ${{ matrix.board }} via PlatformIO CI"
              pio ci "$d" \
                --board ${{ matrix.board }} \
                --lib="." \
                --project-option "platform=https://github.com/pioarduino/platform-espressif32.git" \
                --project-option "build_unflags=-std=gnu++11" \
                --project-option "build_flags=-std=gnu++17" \
                --project-option "lib_deps=ArduinoJson@>=7.0.0"
            fi
          done

  arduino-cli:
    runs-on: ubuntu-latest
    needs: host-portable-smoke
    env:
      ESP32_CORE_VERSION: 3.3.3
      ESP32_ADDITIONAL_URL: https://espressif.github.io/arduino-esp32/package_esp32_index.json
      ARDUINO_BOARDS: |
        esp32:esp32:esp32 esp32dev
        esp32:esp32:esp32s3 esp32-s3-devkitc-1
        esp32:esp32:esp32c3 esp32-c3-devkitm-1
        esp32:esp32:esp32p4 esp32-p4-evboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Prepare Arduino directories
        run: |
          mkdir -p "${HOME}/.arduino15"
          mkdir -p "${HOME}/Arduino/libraries"

      - name: Cache Arduino dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: ${{ runner.os }}-arduino-esp32-${{ env.ESP32_CORE_VERSION }}-${{ hashFiles('library.properties') }}
          restore-keys: |
            ${{ runner.os }}-arduino-esp32-${{ env.ESP32_CORE_VERSION }}-
            ${{ runner.os }}-arduino-esp32-

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index --additional-urls "${ESP32_ADDITIONAL_URL}"
          arduino-cli core install esp32:esp32@${ESP32_CORE_VERSION} --additional-urls "${ESP32_ADDITIONAL_URL}"

      - name: Install libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "ArduinoJson"

      - name: Add local library to sketchbook
        run: |
          set -e
          SKETCHBOOK_DIR="${HOME}/Arduino"
          mkdir -p "$SKETCHBOOK_DIR/libraries/ESPCrypto"
          rsync -a --delete --exclude ".git" ./ "$SKETCHBOOK_DIR/libraries/ESPCrypto/"

      - name: Build Arduino examples
        env:
          BOARDS: ${{ env.ARDUINO_BOARDS }}
        run: |
          set -euo pipefail
          while read -r fqbn board_name; do
            if [ -z "$fqbn" ]; then
              continue
            fi
            echo "::group::Compiling examples for ${board_name} (${fqbn})"
            for d in examples/*; do
              if [ -d "$d" ] && [ ! -f "$d/CMakeLists.txt" ]; then
                echo "Compiling $d"
                arduino-cli compile --fqbn "$fqbn" "$d"
              fi
            done
            echo "::endgroup::"
          done <<< "$BOARDS"
